server {
    listen              443 ssl http2;
    listen              [::]:443 ssl http2;
    server_name         www.{{ domain.name }} {{ domain.name }};

    # SSL
    ssl_certificate     /etc/letsencrypt/live/{{ domain.name }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ domain.name }}/privkey.pem;

    # logging
    access_log          /var/log/nginx/access_{{ domain.name }}.log combined buffer=512k flush=1m if=$log_agent;
    error_log           /var/log/nginx/error_{{ domain.name }}.log warn;


    location /.well-known/carddav {
        return 301 $scheme://$host/remote.php/dav;
    }

    location /.well-known/caldav {
        return 301 $scheme://$host/remote.php/dav;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 4G;

    # reverse proxy
    location / {
        # ModSec config
        modsecurity_rules_file  /etc/nginx/modsecurity-proxyconf/{{ domain.name }}.conf;

        proxy_pass        http://172.18.0.10:80;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-Proto https;
        proxy_set_header  X-Forwarded-Host $host;
        proxy_set_header  X-Forwarded-For $remote_addr;
    }
}

# HTTP redirect
server {
    listen      80;
    listen      [::]:80;
    server_name www.{{ domain.name }} {{ domain.name }};

    # logging
    access_log  /var/log/nginx/access_{{ domain.name }}.log combined buffer=512k flush=1m if=$log_agent;
    error_log   /var/log/nginx/error_{{ domain.name }}.log warn;
    return      301 https://{{ domain.name }}$request_uri;
}
