# If something breaks in this file: Look at changes in upstream config file: https://github.com/coreruleset/modsecurity-crs-docker/blob/develop/nginx/templates/nginx.conf.template
load_module modules/ngx_http_headers_more_filter_module.so;
load_module modules/ngx_http_modsecurity_module.so;

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections ${WORKER_CONNECTIONS};
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    keepalive_timeout ${KEEPALIVE_TIMEOUT};
    sendfile on;

    map $http_user_agent $log_agent {

        ~mlandt-blackbox-monitoring 0;

        default 1;
    }

    # resolver DNS_SERVER valid=5s;
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*.conf;
}
